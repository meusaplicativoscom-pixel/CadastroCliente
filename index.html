<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<title>Controle de Clientes</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 10px;
  padding-bottom: 90px;
}

h1 {
  text-align: center;
  font-size: 22px;
}

.cliente {
  background: #1e293b;
  border-radius: 15px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
}

.botao-grande {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 12px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  text-align: left;
}

.pago { background: green; }
.nao-pago { background: red; }

.info {
  font-size: 12px;
  margin-top: 5px;
}

.botoes {
  display: flex;
  flex-direction: column;
  margin-left: 8px;
}

.botoes button {
  margin-bottom: 4px;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
  font-size: 14px;
}

.btn-pago { background: #22c55e; }   /* verde */
.btn-nao { background: #ef4444; }    /* vermelho */
.btn-editar { background: #f59e0b; } /* amarelo */
.btn-apagar { background: #64748b; } /* cinza */
.btn-msg { background: #25D366; }
.btn-obs { background: #a855f7; }

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  padding: 10px;
  z-index: 1000;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:100%;
  max-width:400px;
  text-align: center;
}

.modal-content button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
}

.fab-container {
  position: fixed;
  bottom: 20px;
  right: 15px;
  display: flex;
  gap: 10px;
}

.fab {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.add-btn { background: blue; }
.export { background: #0ea5e9; }
.import { background: #22c55e; display: flex; align-items: center; justify-content: center; }

#btnInstall {
  position: fixed;
  bottom: 15px;
  left: 15px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: purple;
  color: white;
}
</style>
</head>

<body>

<h1>📋 Clientes</h1>
<div id="lista"></div>

<div class="fab-container">
  <label class="fab import">
    📥
    <input type="file" onchange="importarClientes(event)" hidden>
  </label>
  <button class="fab export" onclick="exportarClientes()">📤</button>
  <button class="fab add-btn" onclick="adicionarCliente()">+</button>
</div>

<button id="btnInstall" style="display:none;">📲 Instalar</button>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="modal" id="modalObs">
  <div class="modal-content">
    <h3>Observações</h3>
    <textarea id="campoObs" style="width:100%;height:120px;"></textarea>
    <br><br>
    <button onclick="salvarObservacao()">Salvar</button>
    <button onclick="fecharModalObs()">Fechar</button>
  </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function estaPago(c){
  if(!c.ultimoPagamento) return false;
  let hoje = new Date();
  let ultimo = new Date(c.ultimoPagamento);
  return ultimo.getMonth() === hoje.getMonth() &&
         ultimo.getFullYear() === hoje.getFullYear();
}

function diasRestantes(c){
  let hoje = new Date().getDate();
  return c.vencimento - hoje;
}

function ordenar(){
  clientes.sort((a,b)=>{
    let pagoA = estaPago(a);
    let pagoB = estaPago(b);
    if(pagoA !== pagoB) return pagoA ? 1 : -1;
    return diasRestantes(a) - diasRestantes(b);
  });
}

function render(){
  ordenar();
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach((c,i)=>{
    let dias = diasRestantes(c);

    let div = document.createElement("div");
    div.className="cliente";

    let btn = document.createElement("button");

    if(estaPago(c)){
      btn.className = "botao-grande pago";
    } else {
      if(dias === 0){
        btn.className = "botao-grande";
        btn.style.background = "orange";
      } else {
        btn.className = "botao-grande nao-pago";
      }
    }

    let status="";
    if(estaPago(c)){
      status="Em dia ✅";
    }else if(dias===0){
      status="⚠️ Vence hoje";
    }else if(dias>0){
      status=`Faltam ${dias} dias`;
    }else{
      status=`❌ Atrasado ${Math.abs(dias)} dias`;
    }

    btn.innerHTML = `
      <div>${c.nome}</div>
      <div class="info">Vence dia ${c.vencimento} • ${status}</div>
    `;

    let botoes = document.createElement("div");
    botoes.className="botoes";
    botoes.innerHTML = `
  <button class="btn-pago" onclick="marcarPago(${i})">✔</button>
  <button class="btn-nao" onclick="marcarNao(${i})">✖</button>
  <button class="btn-editar" onclick="editarCliente(${i})">✏</button>
  <button class="btn-apagar" onclick="apagarCliente(${i})">🗑</button>
`;

    div.append(btn,botoes);
    lista.appendChild(div);
  });
}

function marcarPago(i){
  clientes[i].ultimoPagamento = new Date().toISOString();
  salvar(); render();
}

function marcarNao(i){
  clientes[i].ultimoPagamento = null;
  salvar(); render();
}

function apagarCliente(i){
  if(confirm("Apagar cliente?")){
    clientes.splice(i,1);
    salvar(); render();
  }
}

function adicionarCliente(){
  let nome = prompt("Nome:");
  if(!nome) return;

  clientes.push({
    nome,
    vencimento: parseInt(prompt("Dia de vencimento:")),
    ultimoPagamento:null
  });

  salvar(); render();
}

function editarCliente(i){
  let c = clientes[i];
  c.nome = prompt("Nome:",c.nome);
  c.vencimento = parseInt(prompt("Vencimento:",c.vencimento));
  salvar(); render();
}

function salvar(){
  localStorage.setItem("clientes",JSON.stringify(clientes));
}

function exportarClientes(){
  const blob=new Blob([JSON.stringify(clientes)],{type:"application/json"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="clientes.json";
  link.click();
}

function importarClientes(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      let novos=JSON.parse(ev.target.result);
      clientes = clientes.concat(novos);
      salvar(); render();
    }catch{
      alert("Erro ao importar!");
    }
  };
  reader.readAsText(file);
}

render();
</script>

</body>
</html>
