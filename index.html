
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<title>Controle de Clientes</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 10px;
  margin: 0;
}

h1 {
  text-align: center;
  font-size: 22px;
}

/* Card */
.cliente {
  background: #1e293b;
  border-radius: 15px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
}

/* Botão principal */
.botao-grande {
  flex: 1;
  border: none;
  border-radius: 12px;
  padding: 12px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  text-align: left;
}

.pago { background: green; }
.nao-pago { background: red; }

/* Info */
.info {
  font-size: 12px;
  margin-top: 5px;
}

/* Botões laterais */
.botoes {
  display: flex;
  flex-direction: column;
  margin-left: 8px;
}

.botoes button {
  margin-bottom: 4px;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
  font-size: 14px;
}

.btn-pago { background: green; }
.btn-nao { background: red; }
.btn-editar { background: orange; }
.btn-apagar { background: #555; }

/* Modal */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  padding: 10px;
}

.modal-content {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:100%;
  max-width:400px;
}

/* Botão adicionar */
.add-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: blue;
  color: white;
  border: none;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 28px;
}

/* Botão instalar */
#btnInstall {
  position: fixed;
  bottom: 15px;
  left: 15px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: purple;
  color: white;
}

/* 📱 Ajustes extras para telas pequenas */
@media (max-width: 480px) {
  h1 { font-size: 20px; }

  .botao-grande {
    font-size: 14px;
    padding: 10px;
  }

  .botoes button {
    padding: 6px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<h1>📋 Clientes</h1>
<div id="lista"></div>

<button class="add-btn" onclick="adicionarCliente()">+</button>
<button id="btnInstall" style="display:none;">📲 Instalar</button>
<button onclick="exportarClientes()">📤 Exportar</button>

<input type="file" onchange="importarClientes(event)">

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function diasDesdePagamento(c){
  if(!c.ultimoPagamento) return 999;
  return Math.floor((new Date()-new Date(c.ultimoPagamento))/(1000*60*60*24));
}

function estaPago(c){
  return diasDesdePagamento(c) <= 30;
}

function diasRestantes(c){
  let hoje = new Date();
  return c.vencimento - hoje.getDate();
}

function ordenar(){
  clientes.sort((a,b)=>{
    let pagoA = estaPago(a);
    let pagoB = estaPago(b);

    if(pagoA !== pagoB) return pagoA ? 1 : -1;
    return diasRestantes(a) - diasRestantes(b);
  });
}

function render(){
  ordenar();
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  clientes.forEach((c,i)=>{

    let div = document.createElement("div");
    div.className="cliente";

    let btn = document.createElement("button");
    btn.className="botao-grande "+(estaPago(c)?"pago":"nao-pago");

    let dias = diasRestantes(c);
    let status = dias >= 0 ? `Faltam ${dias} dias` : `Atrasado ${Math.abs(dias)} dias`;

    btn.innerHTML = `
      <div>${c.nome}</div>
      <div class="info">Vence dia ${c.vencimento} • ${status}</div>
    `;

    btn.onclick=()=>abrirModal(c);

    let botoes = document.createElement("div");
    botoes.className="botoes";

    botoes.innerHTML = `
      <button class="btn-pago" onclick="marcarPago(${i})">✔</button>
      <button class="btn-nao" onclick="marcarNao(${i})">✖</button>
      <button class="btn-editar" onclick="editarCliente(${i})">✏</button>
      <button class="btn-apagar" onclick="apagarCliente(${i})">🗑</button>
    `;

    div.append(btn,botoes);
    lista.appendChild(div);
  });
}

function marcarPago(i){
  clientes[i].ultimoPagamento = new Date();
  salvar(); render();
}

function marcarNao(i){
  clientes[i].ultimoPagamento = null;
  salvar(); render();
}

function apagarCliente(i){
  if(confirm("Apagar cliente?")){
    clientes.splice(i,1);
    salvar(); render();
  }
}

function abrirModal(c){
  document.getElementById("modalContent").innerHTML = `
    <h2>${c.nome}</h2><br>
    App1: ${c.app1}<br>
    App2: ${c.app2}<br>
    MAC: ${c.mac}<br>
    Chave: ${c.chave}<br>
    Vencimento: dia ${c.vencimento}<br><br>
    <button onclick="fecharModal()">Fechar</button>
  `;
  document.getElementById("modal").style.display="flex";
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

function adicionarCliente(){
  let nome = prompt("Nome:");
  if(!nome) return;

  clientes.push({
    nome,
    app1: prompt("App1:"),
    app2: prompt("App2:"),
    mac: prompt("MAC:"),
    chave: prompt("Chave:"),
    vencimento: parseInt(prompt("Dia de vencimento:")),
    ultimoPagamento:null
  });

  salvar(); render();
}

function editarCliente(i){
  let c = clientes[i];

  c.nome = prompt("Nome:", c.nome);
  c.app1 = prompt("App1:", c.app1);
  c.app2 = prompt("App2:", c.app2);
  c.mac = prompt("MAC:", c.mac);
  c.chave = prompt("Chave:", c.chave);
  c.vencimento = parseInt(prompt("Vencimento:", c.vencimento));

  salvar(); render();
}

function salvar(){
  localStorage.setItem("clientes", JSON.stringify(clientes));
}
// EXPORTAR clientes
function exportarClientes(){
  const dados = JSON.stringify(clientes);
  const blob = new Blob([dados], {type: "application/json"});
  
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "clientes.json";
  link.click();
}

// IMPORTAR clientes
function importarClientes(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try {
      clientes = JSON.parse(e.target.result);
      salvar();
      render();
      alert("Clientes importados com sucesso!");
    } catch {
      alert("Erro ao importar arquivo!");
    }
  };

  reader.readAsText(file);
}

/* Service Worker */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

render();
</script>

<script>
let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block"; // mostra o botão
});

btnInstall.addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Resultado da instalação:", outcome);
    deferredPrompt = null;
    btnInstall.style.display = "none";
  }
});

// Registrar o Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
